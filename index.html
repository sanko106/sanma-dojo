<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三麻道場</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1208">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="三麻道場">
<link rel="apple-touch-icon" href="./icon-192.png">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1208;--bg2:#221a0e;--bg3:#2e2414;--bg4:#3a2e1c;
  --border:#5a4a2a;--border2:#7a6a3a;
  --text:#f0e8d0;--text2:#c8b88a;--text3:#8a7a50;
  --red:#e84545;--red2:#ff8080;--redbg:#2a1010;
  --blue:#4a9eff;--blue2:#74b9ff;--bluebg:#0d1e35;
  --green:#2ecc71;--green2:#55efc4;--greenbg:#0d2a1e;
  --gold:#f0b429;--goldbg:#2a1f00;
  --accent:#d4a030;
  --r:10px;--r2:14px;
  --tw:52px;--th:70px;
}
@media(min-width:768px){:root{--tw:56px;--th:76px}}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(100,80,40,.04) 3px,rgba(100,80,40,.04) 4px);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;position:relative;z-index:1}
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;gap:3px;transition:color .15s}
.bnb .ic{font-size:22px;line-height:1}
.bnb.active{color:var(--accent)}
.pc-layout{display:flex;flex:1}
.side-nav{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-logo{font-size:20px;font-weight:900;padding:8px 12px 20px;letter-spacing:.08em;font-family:'Noto Serif JP',serif}
.side-logo span{color:var(--accent)}
.snb{display:flex;align-items:center;gap:10px;padding:12px 14px;border:none;background:none;color:var(--text2);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--r);transition:all .15s;text-align:left;width:100%}
.snb .ic{font-size:18px}
.snb:hover{background:var(--bg3);color:var(--text)}
.snb.active{background:var(--bg4);color:var(--accent)}
.content-area{flex:1;overflow-y:auto}
.main{padding:20px;max-width:680px;margin:0 auto;padding-bottom:calc(90px + env(safe-area-inset-bottom))}
@media(max-width:767px){.bottom-nav{display:flex}.side-nav{display:none}}
@media(min-width:768px){.bottom-nav{display:none}.side-nav{display:flex}.main{padding:28px 32px;padding-bottom:32px}}

.tile-wrap{display:inline-block;position:relative;flex-shrink:0;cursor:pointer;touch-action:manipulation;transition:transform .12s,filter .12s}
.tile-wrap:active:not(.disabled){transform:translateY(-5px)}
.tile-wrap.disabled{cursor:default;pointer-events:none}
.tile-wrap.state-correct{transform:translateY(-10px);filter:drop-shadow(0 0 10px rgba(46,204,113,.9))}
.tile-wrap.state-wrong{filter:drop-shadow(0 0 10px rgba(232,69,69,.9));animation:shake .35s ease}
.tile-wrap.state-dimmed{opacity:.25}
.tile-wrap.state-answer-hi{filter:drop-shadow(0 0 8px rgba(46,204,113,.7))}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pop{animation:popIn .3s ease forwards}
.fade-up{animation:fadeUp .2s ease forwards}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px}
.sec-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;flex-shrink:0}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;touch-action:manipulation;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1208;font-weight:900}
.btn.primary:active{opacity:.8}
.btn.danger{border-color:var(--red);color:var(--red2)}
.btn.danger:active{background:var(--redbg)}
.btn.gold{border-color:var(--gold);color:var(--gold)}
.btn.gold:active{background:var(--goldbg)}
.btn.sm{padding:9px 14px;font-size:13px}
.btn.lg{padding:16px 28px;font-size:17px;border-radius:var(--r2);letter-spacing:.05em}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-full{width:100%}

input[type=text],textarea,select{width:100%;padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border .15s;-webkit-appearance:none}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.6}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px}
.form-group{margin-bottom:18px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;touch-action:manipulation}
.tag.on{background:var(--accent);color:#1a1208;border-color:var(--accent)}
.tag.off{background:var(--bg3);color:var(--text2);border-color:var(--border)}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.red{background:var(--redbg);color:var(--red2);border:1px solid var(--red)}
.badge.green{background:var(--greenbg);color:var(--green2);border:1px solid var(--green)}
.badge.blue{background:var(--bluebg);color:var(--blue2);border:1px solid var(--blue)}
.badge.gold{background:var(--goldbg);color:var(--gold);border:1px solid var(--gold)}
.badge.gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.timer-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;font-family:'DM Mono',monospace}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s ease}
.score-big{font-size:64px;font-weight:900;font-family:'DM Mono',monospace;text-align:center;line-height:1}
.feedback{border-radius:var(--r2);padding:16px;margin-top:14px;text-align:center;animation:popIn .25s ease}
.feedback.ok{background:var(--greenbg);border:1px solid var(--green)}
.feedback.ng{background:var(--redbg);border:1px solid var(--red)}
.fb-icon{font-size:40px;margin-bottom:6px}
.fb-title{font-size:20px;font-weight:900;margin-bottom:4px}
.fb-sub{font-size:13px;color:var(--text2);line-height:1.6}

.cal-wrap{overflow-x:auto;padding-bottom:4px}
.cal-grid{display:flex;gap:3px}
.cal-col{display:flex;flex-direction:column;gap:3px}
.cal-cell{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.cal-cell.lv0{background:var(--bg3)}.cal-cell.lv1{background:#0d3320}.cal-cell.lv2{background:#166534}.cal-cell.lv3{background:#22c55e}.cal-cell.lv4{background:#86efac}

.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{font-size:12px;color:var(--text2);width:100px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#1a1208;transition:width .6s ease;border-radius:4px}
.bar-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);width:44px;flex-shrink:0}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.05em}

.prob-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.prob-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-text{font-size:14px;line-height:1.9}
.hand-area{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end;min-height:80px;padding:10px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--r)}
.tile-sep-el{width:3px;align-self:stretch;background:var(--border2);border-radius:2px;margin:0 2px;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const CATEGORIES = ['多面張','5ブロック','孤立牌','守備','鳴き判断','リーチ判断','北抜き','字牌整理','ターツ選択','その他'];
const HONOR_ITEMS = [{num:1,label:'東'},{num:2,label:'南'},{num:3,label:'西'},{num:4,label:'白'},{num:5,label:'発'},{num:6,label:'中'}];
const KITA_ITEMS = [{num:1,label:'北'}];

const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

const genId = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const suitOrder = s=>({man:0,pin:1,sou:2,honor:3,kita:4}[s]??5);
const sortTiles = ts=>[...ts].sort((a,b)=>suitOrder(a.suit)-suitOrder(b.suit)||a.num-b.num);
const tileKey = t=>`${t.suit}_${t.num}`;
const todayKey = ()=>new Date().toISOString().slice(0,10);
function lastNDays(n){const d=[];for(let i=n-1;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().slice(0,10));}return d;}

function transformTiles(tiles,type){
  if(type==='color') return sortTiles(tiles.map(t=>t.suit==='pin'?{...t,suit:'sou'}:t.suit==='sou'?{...t,suit:'pin'}:t));
  if(type==='flip')  return sortTiles(tiles.map(t=>['pin','sou'].includes(t.suit)?{...t,num:10-t.num}:t.suit==='man'?{...t,num:t.num===1?9:1}:t));
  if(type==='both')  return transformTiles(transformTiles(tiles,'color'),'flip');
  return tiles;
}
function transformTile(tile,type){if(!tile)return null;return transformTiles([tile],type)[0]??tile;}
const tfLabel = t=>({color:'色替え(p⇔s)',flip:'数字反転',both:'色替え＋反転',none:'オリジナル'}[t]??'');
function priorityScore(p){if(p.totalCount===0)return -1;return p.correctCount/p.totalCount;}

// ===== 牌SVG =====
function TileSVG({suit,num,label,w,h}){
  const W=w||52,H=h||70;
  const KANJI={1:'一',2:'二',3:'三',4:'四',5:'五',6:'六',7:'七',8:'八',9:'九'};

  const renderFace=()=>{
    if(suit==='man'){
      return <>
        <text x={W/2} y={H*0.51} textAnchor="middle" fontSize={H*0.37} fontWeight="900"
          fontFamily="'Noto Serif JP',serif" fill="#cc1a0a" dominantBaseline="middle">{KANJI[num]||num}</text>
        <text x={W/2} y={H*0.79} textAnchor="middle" fontSize={H*0.14} fontWeight="700"
          fontFamily="'Noto Serif JP',serif" fill="#8a3020">萬</text>
      </>;
    }
    if(suit==='pin'){
      const c=W/2, p=W*0.27;
      const st=Math.max(W*0.05,2), r=Math.max(W*0.1,4);
      const dot=(cx,cy,isRed,key)=><circle key={key??`${cx}${cy}`} cx={cx} cy={cy} r={r}
        fill="none" stroke={isRed?'#b01010':'#1a3a9a'} strokeWidth={st}/>;
      // 7筒: 斜め3青＋右下2x2赤
      if(num===7){
        const lx=c-p*0.85, rx=c+p*0.85;
        return<g>
          {dot(lx, H*0.19, false,'p7a')}
          {dot(c,  H*0.36, false,'p7b')}
          {dot(rx, H*0.53, false,'p7c')}
          {dot(c,  H*0.68, true,'p7d')}
          {dot(rx, H*0.68, true,'p7e')}
          {dot(c,  H*0.84, true,'p7f')}
          {dot(rx, H*0.84, true,'p7g')}
        </g>;
      }
      // 6筒: 上2青, 下4赤
      if(num===6){
        return<g>
          {dot(c-p,H*0.22,false,'p6a')}{dot(c+p,H*0.22,false,'p6b')}
          {dot(c-p,H*0.5, true,'p6c')}{dot(c+p,H*0.5, true,'p6d')}
          {dot(c-p,H*0.78,true,'p6e')}{dot(c+p,H*0.78,true,'p6f')}
        </g>;
      }
      // 9筒: 上段青, 中段赤, 下段青
      if(num===9){
        return<g>
          {dot(c-p,H*0.18,false,'p9a')}{dot(c,H*0.18,false,'p9b')}{dot(c+p,H*0.18,false,'p9c')}
          {dot(c-p,H*0.5, true,'p9d')}{dot(c, H*0.5, true,'p9e')}{dot(c+p,H*0.5, true,'p9f')}
          {dot(c-p,H*0.82,false,'p9g')}{dot(c,H*0.82,false,'p9h')}{dot(c+p,H*0.82,false,'p9i')}
        </g>;
      }
      const layouts={
        1:[[c,H/2,true]],
        2:[[c,H*0.31,false],[c,H*0.69,false]],
        3:[[c,H*0.24,false],[c,H*0.5,true],[c,H*0.76,false]],
        4:[[c-p,H*0.31,false],[c+p,H*0.31,false],[c-p,H*0.69,false],[c+p,H*0.69,false]],
        5:[[c-p,H*0.26,false],[c+p,H*0.26,false],[c,H*0.5,true],[c-p,H*0.74,false],[c+p,H*0.74,false]],
        8:[[c-p,H*0.19,false],[c+p,H*0.19,false],[c-p,H*0.38,false],[c+p,H*0.38,false],[c-p,H*0.62,false],[c+p,H*0.62,false],[c-p,H*0.81,false],[c+p,H*0.81,false]],
      };
      return (layouts[num]||[]).map(([x,y,red],i)=>dot(x,y,red,i));
    }
    if(suit==='sou'){
      const G='#107020', R='#c01010';
      const c=W/2;
      const sw=W*0.13, sh=H*0.13, st=Math.max(W*0.032,1.5);
      // H型記号（鎹）
      const sym=(cx,cy,col,key)=><g key={key}>
        <line x1={cx} y1={cy-sh/2} x2={cx} y2={cy+sh/2} stroke={col} strokeWidth={st} strokeLinecap="round"/>
        <line x1={cx-sw/2} y1={cy-sh/2} x2={cx+sw/2} y2={cy-sh/2} stroke={col} strokeWidth={st} strokeLinecap="round"/>
        <line x1={cx-sw/2} y1={cy+sh/2} x2={cx+sw/2} y2={cy+sh/2} stroke={col} strokeWidth={st} strokeLinecap="round"/>
      </g>;

      // 1索: 菊の花＋鳥（参考画像に近い絵札スタイル）
      if(num===1){
        const fx=c, fy=H*0.36; // 花の中心
        const fr=W*0.18; // 花弁の広がり
        const petals=8;
        return<g>
          {/* 菊の花：花弁8枚 */}
          {Array.from({length:petals},(_,i)=>{
            const a=i*Math.PI*2/petals;
            const px=fx+Math.cos(a)*fr, py=fy+Math.sin(a)*fr*0.9;
            return<ellipse key={i} cx={(fx+px)/2} cy={(fy+py)/2}
              rx={fr*0.35} ry={fr*0.18}
              transform={`rotate(${i*360/petals},${(fx+px)/2},${(fy+py)/2})`}
              fill={G} opacity="0.85"/>;
          })}
          {/* 花の中心 */}
          <circle cx={fx} cy={fy} r={W*0.07} fill="#f0c020"/>
          <circle cx={fx} cy={fy} r={W*0.04} fill="#d09000"/>
          {/* 鳥（簡略・胴体） */}
          <ellipse cx={fx} cy={fy+H*0.16} rx={W*0.14} ry={H*0.055} fill={G}/>
          {/* 鳥の頭 */}
          <circle cx={fx+W*0.14} cy={fy+H*0.12} r={W*0.06} fill={G}/>
          {/* 目 */}
          <circle cx={fx+W*0.18} cy={fy+H*0.11} r={W*0.02} fill="#fffef8"/>
          <circle cx={fx+W*0.185} cy={fy+H*0.11} r={W*0.01} fill="#1a1a1a"/>
          {/* くちばし */}
          <path d={`M${fx+W*0.22},${fy+H*0.13} L${fx+W*0.27},${fy+H*0.12} L${fx+W*0.22},${fy+H*0.115}`} fill={R}/>
          {/* 尾羽 */}
          <path d={`M${fx-W*0.12},${fy+H*0.16} Q${fx-W*0.22},${fy+H*0.2} ${fx-W*0.2},${fy+H*0.1}`} fill="none" stroke={G} strokeWidth={st*0.8}/>
          {/* 下に赤記号1個 */}
          {sym(c,H*0.78,R,'s1')}
        </g>;
      }

      // 7索: I / I I I / I I I / I I I  (1+3+3+3=10ではなく仕様: I/III/III/III=7個, 上1個が赤, 残り緑)
      if(num===7){
        const lx=c-W*0.2, rx=c+W*0.2;
        return<g>
          {sym(c,  H*0.16, R,'s7t')}
          {sym(lx, H*0.36, G,'s7ml')}{sym(c,H*0.36,G,'s7mc')}{sym(rx,H*0.36,G,'s7mr')}
          {sym(lx, H*0.57, G,'s7cl')}{sym(c,H*0.57,G,'s7cc')}{sym(rx,H*0.57,G,'s7cr')}
          {sym(lx, H*0.78, G,'s7bl')}{sym(c,H*0.78,G,'s7bc')}{sym(rx,H*0.78,G,'s7br')}
        </g>;
      }

      // 3索: I / I I  (上1個, 下2個, 全て緑)
      if(num===3){
        return<g>
          {sym(c,      H*0.28, G,'s3t')}
          {sym(c-W*0.2,H*0.65, G,'s3bl')}
          {sym(c+W*0.2,H*0.65, G,'s3br')}
        </g>;
      }

      // 9索: 3x3グリッド, 中央列(col=1)が赤, 左右列が緑
      if(num===9){
        const lx=c-W*0.22, rx=c+W*0.22;
        const ys=[H*0.22, H*0.5, H*0.78];
        return<g>
          {ys.map((y,i)=>[
            sym(lx, y, G, `s9l${i}`),
            sym(c,  y, R, `s9c${i}`),
            sym(rx, y, G, `s9r${i}`),
          ])}
        </g>;
      }

      // 2〜9索（1,3,7,9以外）
      const layouts={
        2:{pts:[[c,H*0.32],[c,H*0.68]]},
        4:{pts:[[c-W*0.18,H*0.32],[c+W*0.18,H*0.32],[c-W*0.18,H*0.68],[c+W*0.18,H*0.68]]},
        5:{pts:[[c-W*0.18,H*0.22],[c+W*0.18,H*0.22],[c,H*0.5],[c-W*0.18,H*0.78],[c+W*0.18,H*0.78]]},
        6:{pts:[[c-W*0.18,H*0.22],[c+W*0.18,H*0.22],[c-W*0.18,H*0.5],[c+W*0.18,H*0.5],[c-W*0.18,H*0.78],[c+W*0.18,H*0.78]]},
        8:{pts:[[c-W*0.18,H*0.17],[c+W*0.18,H*0.17],[c-W*0.18,H*0.37],[c+W*0.18,H*0.37],[c-W*0.18,H*0.57],[c+W*0.18,H*0.57],[c-W*0.18,H*0.77],[c+W*0.18,H*0.77]]},
      };
      const lay=layouts[num];
      if(!lay)return null;
      const redIdx={5:[2]};
      const reds=new Set(redIdx[num]||[]);
      return lay.pts.map(([px,py],i)=>sym(px,py,reds.has(i)?R:G,i));
    }
    if(suit==='honor'){
      const col={1:'#1a1a1a',2:'#1a1a1a',3:'#1a1a1a',4:'#1a1a1a',5:'#107020',6:'#cc1a0a'}[num]||'#1a1a1a';
      return<text x={W/2} y={H*0.55} textAnchor="middle" fontSize={H*0.40} fontWeight="900"
        fontFamily="'Noto Serif JP',serif" fill={col} dominantBaseline="middle">{label}</text>;
    }
    if(suit==='kita'){
      return<>
        <text x={W/2} y={H*0.43} textAnchor="middle" fontSize={H*0.33} fontWeight="900"
          fontFamily="'Noto Serif JP',serif" fill="#1a3a9a" dominantBaseline="middle">北</text>
        <text x={W/2} y={H*0.76} textAnchor="middle" fontSize={H*0.16} fontWeight="700"
          fontFamily="'Noto Serif JP',serif" fill="#1a3a9a">抜</text>
      </>;
    }
    return null;
  };

  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
      <rect x="2" y="3" width={W} height={H} rx="6" fill="rgba(0,0,0,.4)"/>
      <rect x="0" y="0" width={W} height={H} rx="6" fill="#f5f0e2" stroke="#b8a878" strokeWidth="1"/>
      <rect x="1" y="1" width={W-2} height={H*0.4} rx="5" fill="#fffef8" opacity="0.55"/>
      <rect x="3" y="3" width={W-6} height={H-6} rx="4" fill="none" stroke="#d4c8a8" strokeWidth="0.5"/>
      {renderFace()}
    </svg>
  );
}

function Tile({suit,num,label,size='',state='',onClick,disabled}){
  const root=document.documentElement;
  const TW=size==='xs'?30:size==='sm'?40:parseInt(getComputedStyle(root).getPropertyValue('--tw'))||52;
  const TH=size==='xs'?40:size==='sm'?54:parseInt(getComputedStyle(root).getPropertyValue('--th'))||70;
  const cls=['tile-wrap',state?`state-${state}`:'',disabled?'disabled':''].filter(Boolean).join(' ');
  return(
    <div className={cls} onClick={!disabled?onClick:undefined} style={{width:TW,height:TH}}>
      <TileSVG suit={suit} num={num} label={label} w={TW} h={TH}/>
    </div>
  );
}

const SUIT_DEFS=[
  {key:'pin',label:'筒子 p',nums:[1,2,3,4,5,6,7,8,9]},
  {key:'sou',label:'索子 s',nums:[1,2,3,4,5,6,7,8,9]},
  {key:'man',label:'萬子 m',nums:[1,9]},
  {key:'honor',label:'字牌',items:HONOR_ITEMS},
  {key:'kita',label:'北（抜）',items:KITA_ITEMS},
];

function TilePalette({onAdd,maxCount,currentCount}){
  const [suit,setSuit]=useState('pin');
  const full=currentCount>=maxCount;
  const cur=SUIT_DEFS.find(s=>s.key===suit);
  return(
    <div>
      <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
        {SUIT_DEFS.map(s=>(
          <button key={s.key} onClick={()=>setSuit(s.key)} style={{
            padding:'9px 14px',border:`1px solid ${suit===s.key?'var(--accent)':'var(--border)'}`,
            borderRadius:'var(--r)',background:suit===s.key?'var(--accent)':'var(--bg3)',
            color:suit===s.key?'#1a1208':'var(--text2)',cursor:'pointer',fontSize:13,
            fontFamily:'inherit',fontWeight:700,transition:'all .15s',
          }}>{s.label}</button>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,padding:8,background:'var(--bg)',borderRadius:'var(--r)',border:'1px solid var(--border)'}}>
        {cur&&(cur.items||cur.nums.map(n=>({num:n}))).map(item=>(
          <Tile key={item.num} suit={suit} num={item.num} label={item.label}
            onClick={()=>!full&&onAdd({suit,num:item.num,label:item.label,id:genId()})}
            disabled={full}/>

      </div>
      {full&&<div style={{fontSize:12,color:'var(--text3)',marginTop:6}}>最大{maxCount}牌（タップで削除）</div>}
    </div>
  );
}

function ProblemListScreen({problems,onDelete,onToggleReview}){
  const [filter,setFilter]=useState('all');

  const filtered=problems.filter(p=>{
    if(filter==='review'&&!p.reviewFlag)return false;

  });
  return(
    <div className="fade-up">
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {[['all','すべて'],['review','復習'],['weak','苦手']].map(([k,l])=>(
          <button key={k} className={`btn sm ${filter===k?'primary':''}`} onClick={()=>setFilter(k)}>{l}</button>
        ))}

          <option value="">全カテゴリ</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}

      </div>
      <div style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>{filtered.length}件</div>

          const acc=p.totalCount>0?Math.round(p.correctCount/p.totalCount*100):null;
          return(
            <div key={p.id} className="prob-card">
              <div className="prob-header">
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {p.tags.map(t=><span key={t} className="badge blue">{t}</span>)}

            </div>

  );

// ★ バグ修正：TrainingScreenを完全に独立したコンポーネントとして定義
// 内部stateがApp全体のre-renderに引きずられないよう、
// tab切り替えでもこのコンポーネントはアンマウントしない（MainContentで常に保持）
function TrainingScreen({problems,onResult,onAddReview}){
  const TOTAL=10,TIME=30;
  const [phase,setPhase]=useState('ready');
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [timeLeft,setTimeLeft]=useState(TIME);
  const [judged,setJudged]=useState(null);
  const [selectedKey,setSelectedKey]=useState(null);
  const [doneResults,setDoneResults]=useState([]);
  const [toast,setToast]=useState(false);
  const timerRef=useRef(null);
  const nextRef=useRef(null);
  // stale closure回避用ref
  const queueRef=useRef([]);
  const idxRef=useRef(0);
  const collectedRef=useRef([]);

  const buildQueue=()=>{
    if(!problems.length)return[];
    const sorted=[...problems].sort((a,b)=>priorityScore(a)-priorityScore(b));
    const tfs=['none','color','flip','both'];
    return Array.from({length:TOTAL},(_,i)=>{
      const p=sorted[i%sorted.length];
      const tf=tfs[Math.floor(Math.random()*tfs.length)];
      return{problem:p,hand:tf==='none'?p.hand:transformTiles(p.hand,tf),
        tsumo:p.tsumo&&tf!=='none'?transformTile(p.tsumo,tf):p.tsumo,
        answer:tf==='none'?p.answer:transformTile(p.answer,tf),transform:tf};
    });
  };

  const startTraining=()=>{
    clearInterval(timerRef.current);clearTimeout(nextRef.current);
    const q=buildQueue();
    if(!q.length)return;
    queueRef.current=q;idxRef.current=0;collectedRef.current=[];
    setQueue(q);setIdx(0);setJudged(null);setSelectedKey(null);
    setTimeLeft(TIME);setDoneResults([]);setPhase('question');
  };

  // タイマー：phaseとidxをキーにしてリセット
  useEffect(()=>{
    if(phase!=='question'){clearInterval(timerRef.current);return;}
    setTimeLeft(TIME);
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(timerRef.current);fireTimeout();return 0;}
        return t-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[phase,idx]);// eslint-disable-line react-hooks/exhaustive-deps

  const fireTimeout=()=>{
    const cur=queueRef.current[idxRef.current];
    if(cur)onResult(cur.problem.id,false);
    setJudged('timeout');
    goNext(false);
  };

  const handleTap=(tile)=>{
    if(judged!==null)return;
    clearInterval(timerRef.current);
    const cur=queueRef.current[idxRef.current];
    if(!cur)return;
    const isCorrect=tileKey(tile)===tileKey(cur.answer);
    setSelectedKey(tileKey(tile));
    setJudged(isCorrect?'correct':'wrong');
    onResult(cur.problem.id,isCorrect);
    goNext(isCorrect);
  };

  const goNext=(isCorrect)=>{
    clearTimeout(nextRef.current);
    collectedRef.current=[...collectedRef.current,{isCorrect}];
    // 正解・不正解どちらもボタン押下まで待機（自動遷移なし）
  };

  const advanceToNext=()=>{
    clearTimeout(nextRef.current);
    const collected=[...collectedRef.current];
    if(collected.length>=TOTAL){
      setDoneResults(collected);setPhase('done');
    } else {
      idxRef.current=idxRef.current+1;
      setIdx(idxRef.current);
      setJudged(null);setSelectedKey(null);
    }
  };

  useEffect(()=>()=>{clearInterval(timerRef.current);clearTimeout(nextRef.current);},[]);

  const addReviewWithToast=id=>{
    onAddReview(id);setToast(true);
    setTimeout(()=>setToast(false),2000);
  };

  if(phase==='ready') return(
    <div className="fade-up" style={{textAlign:'center',padding:'48px 16px'}}>
      <div style={{fontSize:60,marginBottom:16}}>🀄</div>
      <div style={{fontSize:24,fontWeight:900,marginBottom:10,fontFamily:"'Noto Serif JP',serif",letterSpacing:'.05em'}}>道場へ入門する</div>
      <div style={{fontSize:14,color:'var(--text2)',lineHeight:1.9,marginBottom:32}}>
        {TOTAL}問出題・1問{TIME}秒の制限時間<br/>正解率が低い苦手問題を優先出題<br/>切りたい牌をタップして回答
      </div>
      {problems.length===0?<div style={{color:'var(--text3)',fontSize:14}}>まず問題を登録してください</div>
        :<button className="btn primary lg btn-full" onClick={startTraining} style={{maxWidth:280,margin:'0 auto'}}>稽古開始</button>}
    </div>
  );

  if(phase==='done'){
    const correct=doneResults.filter(r=>r.isCorrect).length;
    const score=correct*10;
    const col=score>=70?'var(--green)':score>=40?'var(--gold)':'var(--red)';
    return(
      <div className="fade-up" style={{textAlign:'center',padding:'32px 0'}}>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>稽古終了</div>
        <div className="score-big pop" style={{color:col}}>{score}<span style={{fontSize:28}}>点</span></div>
        <div style={{fontSize:14,color:'var(--text2)',margin:'8px 0 20px'}}>{correct}/{TOTAL} 正解</div>
        <div style={{height:8,background:'var(--bg3)',borderRadius:4,overflow:'hidden',maxWidth:280,margin:'0 auto 28px'}}>
          <div style={{width:`${score}%`,height:'100%',background:col,borderRadius:4,transition:'width .8s ease'}}/>
        </div>
        <div className="btn-row" style={{justifyContent:'center'}}>
          <button className="btn primary lg" onClick={startTraining}>もう一周</button>
          <button className="btn lg" onClick={()=>setPhase('ready')}>終了</button>
        </div>
      </div>
    );
  }

  const cur=queue[idx];
  if(!cur||phase!=='question')return null;
  const ansKey=tileKey(cur.answer);
  const circ=2*Math.PI*23;
  const offset=circ*(1-timeLeft/TIME);
  const tc=timeLeft<=10?'var(--red)':timeLeft<=20?'var(--gold)':'var(--green)';

  return(
    <div>
      {toast&&<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',
        background:'var(--gold)',color:'#1a1208',padding:'10px 20px',borderRadius:'var(--r)',
        fontWeight:700,fontSize:13,zIndex:999,animation:'popIn .25s ease'}}>☆ 復習リストに追加しました</div>}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>問題 {idx+1} / {TOTAL}</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${(idx/TOTAL)*100}%`,background:'var(--accent)'}}/></div>
        </div>
        {cur.transform!=='none'&&<span className="badge blue">{tfLabel(cur.transform)}</span>}
        <div className="timer-ring">
          <svg width="54" height="54" viewBox="0 0 54 54">
            <circle cx="27" cy="27" r="23" fill="none" stroke="var(--bg3)" strokeWidth="4"/>
            <circle cx="27" cy="27" r="23" fill="none" stroke={tc} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={offset}
              style={{transition:'stroke-dashoffset 1s linear,stroke .3s'}}/>
          </svg>
          <div className="timer-num" style={{color:tc}}>{timeLeft}</div>
        </div>
      </div>
      <div className="card">
        <div style={{fontSize:18,fontWeight:900,textAlign:'center',marginBottom:4,fontFamily:"'Noto Serif JP',serif"}}>何を切る？</div>
        <div style={{fontSize:12,color:'var(--text2)',textAlign:'center',marginBottom:20}}>{judged?'':'切りたい牌をタップ'}</div>
        <div style={{display:'flex',justifyContent:'center',flexWrap:'wrap',gap:6,marginBottom:16,alignItems:'flex-end'}}>
          {cur.hand.map((t,i)=>{
            const tk=tileKey(t),isAns=tk===ansKey,isSel=tk===selectedKey;
            let state='';
            if(judged!==null){if(isAns)state='correct';else if(isSel)state='wrong';else state='dimmed';}
            return<Tile key={t.id??i} {...t} state={state} disabled={judged!==null} onClick={()=>handleTap(t)}/>;
          })}
          {cur.tsumo&&(()=>{
            const tk=tileKey(cur.tsumo),isAns=tk===ansKey,isSel=tk===selectedKey;
            let state='';
            if(judged!==null){if(isAns)state='correct';else if(isSel)state='wrong';else state='dimmed';}
            return<><div className="tile-sep-el"/><Tile {...cur.tsumo} state={state} disabled={judged!==null} onClick={()=>handleTap(cur.tsumo)}/></>;
          })()}
        </div>
        {judged!==null&&(
          <div className={`feedback ${judged==='correct'?'ok':'ng'}`}>
            <div className="fb-icon">{judged==='correct'?'🎯':judged==='timeout'?'⏰':'💦'}</div>
            <div className="fb-title" style={{color:judged==='correct'?'var(--green2)':'var(--red2)'}}>
              {judged==='correct'?'正解！':judged==='timeout'?'時間切れ':'不正解'}
            </div>
            {judged!=='correct'&&<div style={{margin:'8px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <span style={{fontSize:12,color:'var(--text2)'}}>正解：</span>
              <Tile {...cur.answer} state="answer-hi" size="sm" disabled/>
            </div>}
            {cur.problem.memo&&<div className="fb-sub" style={{marginTop:8,textAlign:'left',background:'rgba(0,0,0,.25)',borderRadius:'var(--r)',padding:'10px 12px'}}>{cur.problem.memo}</div>}
            <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:14,flexWrap:'wrap'}}>
              {judged!=='correct'&&<button className="btn gold sm" onClick={()=>addReviewWithToast(cur.problem.id)}>☆ 復習リストへ</button>}
              <button className="btn primary sm" onClick={advanceToNext}>次の問題へ →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AnalyticsScreen({problems,dailyLog,onImport}){
  const practiced=problems.filter(p=>p.totalCount>0);
  const totalQ=problems.reduce((s,p)=>s+p.totalCount,0);
  const totalC=problems.reduce((s,p)=>s+p.correctCount,0);
  const acc=totalQ>0?Math.round(totalC/totalQ*100):0;
  const tagStats=CATEGORIES.map(cat=>{
    const ps=problems.filter(p=>p.tags.includes(cat)&&p.totalCount>0);
    if(!ps.length)return null;
    const c=ps.reduce((s,p)=>s+p.correctCount,0),t=ps.reduce((s,p)=>s+p.totalCount,0);
    return{cat,acc:Math.round(c/t*100),n:ps.length};
  }).filter(Boolean).sort((a,b)=>a.acc-b.acc);
  const days=lastNDays(105);
  const weeks=[];for(let i=0;i<days.length;i+=7)weeks.push(days.slice(i,i+7));
  const exportData=()=>{
    const blob=new Blob([JSON.stringify({version:4,problems,dailyLog},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`sanma_${todayKey()}.json`;a.click();
  };
  const importData=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.problems)return alert('形式エラー');onImport(d);alert(`✅ ${d.problems.length}件インポートしました`);}catch{alert('形式エラー');}};
    r.readAsText(f);e.target.value='';
  };
  return(
    <div className="fade-up">
      <div className="stat-grid" style={{marginBottom:14}}>
        <div className="stat-box"><div className="stat-num">{problems.length}</div><div className="stat-lbl">登録問題数</div></div>
        <div className="stat-box"><div className="stat-num">{practiced.length}</div><div className="stat-lbl">練習済み</div></div>
        <div className="stat-box"><div className="stat-num">{acc}<span style={{fontSize:16}}>%</span></div><div className="stat-lbl">総合正解率</div></div>
        <div className="stat-box"><div className="stat-num">{totalQ}</div><div className="stat-lbl">総解答数</div></div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">学習カレンダー（過去15週）</div>
        <div className="cal-wrap"><div className="cal-grid">
          {weeks.map((week,wi)=><div key={wi} className="cal-col">
            {week.map(d=>{const v=dailyLog[d]||0;const lv=v===0?0:v<=3?1:v<=8?2:v<=15?3:4;return<div key={d} className={`cal-cell lv${lv}`} title={`${d}: ${v}問`}/>;})}
          </div>)}
        </div></div>
        <div style={{display:'flex',gap:4,alignItems:'center',marginTop:8}}>
          <span style={{fontSize:11,color:'var(--text3)'}}>少</span>
          {[0,1,2,3,4].map(l=><div key={l} className={`cal-cell lv${l}`}/>)}
          <span style={{fontSize:11,color:'var(--text3)'}}>多</span>
        </div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">カテゴリ別正解率（低い順）</div>
        {tagStats.length===0?<div style={{color:'var(--text3)',fontSize:13}}>データがありません</div>
          :<div className="bar-chart">{tagStats.map(({cat,acc:a,n})=>(
            <div key={cat} className="bar-row">
              <div className="bar-lbl">{cat}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${a}%`,background:a>=70?'var(--green)':a>=40?'var(--gold)':'var(--red)'}}>{a}%</div></div>
              <div className="bar-val">{n}問</div>
            </div>
          ))}</div>}
      </div>
      <div className="card">
        <div className="sec-title">データ管理</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:12,lineHeight:1.7}}>
          バージョン更新時は「エクスポート」→新版で「インポート」してください。
        </div>
        <div className="btn-row">
          <button className="btn sm" onClick={exportData}>📤 エクスポート</button>
          <button className="btn sm" onClick={()=>document.getElementById('imp-file').click()}>📥 インポート</button>
          <input type="file" id="imp-file" accept=".json" style={{display:'none'}} onChange={importData}/>
        </div>
      </div>
    </div>
  );
}

// ★ バグ修正の核心：MainContentを独立した関数コンポーネントとして定義
// App内のインライン関数「Content」にしないことで、tabが変わっても
// TrainingScreenのstateがリセットされなくなる
function MainContent({tab,problems,dailyLog,onResult,onAddReview,onSaveProblem,onDelete,onToggleReview,onImport}){
  if(tab==='train') return <TrainingScreen problems={problems} onResult={onResult} onAddReview={onAddReview}/>;
  if(tab==='add')   return <AddProblemScreen onSave={onSaveProblem}/>;
  if(tab==='list')  return <ProblemListScreen problems={problems} onDelete={onDelete} onToggleReview={onToggleReview}/>;
  if(tab==='analytics') return <AnalyticsScreen problems={problems} dailyLog={dailyLog} onImport={onImport}/>;
  return null;
}

function App(){
  const [tab,setTab]=useState('train');
  const [problems,setProblems]=useState(()=>LS.get('sanma_problems',[]));
  const [dailyLog,setDailyLog]=useState(()=>LS.get('sanma_daily',{}));
  useEffect(()=>{LS.set('sanma_problems',problems);},[problems]);
  useEffect(()=>{LS.set('sanma_daily',dailyLog);},[dailyLog]);
  const handleImport=d=>{
    setProblems(prev=>{const m=new Map(prev.map(p=>[p.id,p]));(d.problems||[]).forEach(p=>m.set(p.id,p));return[...m.values()];});
    if(d.dailyLog)setDailyLog(prev=>{const m={...prev};Object.entries(d.dailyLog).forEach(([k,v])=>{m[k]=Math.max(m[k]||0,v);});return m;});
  };
  const saveProblem=p=>setProblems(prev=>[p,...prev]);
  const deleteProblem=id=>setProblems(prev=>prev.filter(p=>p.id!==id));
  const toggleReview=id=>setProblems(prev=>prev.map(p=>p.id===id?{...p,reviewFlag:!p.reviewFlag}:p));
  const addReview=id=>setProblems(prev=>prev.map(p=>p.id===id?{...p,reviewFlag:true}:p));
  const recordResult=(id,isCorrect)=>{
    setProblems(prev=>prev.map(p=>p.id===id?{...p,correctCount:p.correctCount+(isCorrect?1:0),totalCount:p.totalCount+1}:p));
    setDailyLog(prev=>({...prev,[todayKey()]:(prev[todayKey()]||0)+1}));
  };
  const NAV=[{key:'train',ic:'⚔️',lb:'道場'},{key:'add',ic:'➕',lb:'登録'},{key:'list',ic:'📋',lb:'問題帳'},{key:'analytics',ic:'📊',lb:'分析'}];
  const cp={tab,problems,dailyLog,onResult:recordResult,onAddReview:addReview,
    onSaveProblem:p=>{saveProblem(p);setTab('list');},onDelete:deleteProblem,onToggleReview:toggleReview,onImport:handleImport};
  return(
    <div className="app">
      <div className="pc-layout">
        <div className="side-nav">
          <div className="side-logo">三麻<span>道場</span></div>
          {NAV.map(n=><button key={n.key} className={`snb ${tab===n.key?'active':''}`} onClick={()=>setTab(n.key)}><span className="ic">{n.ic}</span>{n.lb}</button>)}
          <div style={{marginTop:'auto',fontSize:11,color:'var(--text3)',padding:'8px 12px',lineHeight:1.7}}>データはブラウザに<br/>自動保存されます</div>
        </div>
        <div className="content-area"><div className="main"><MainContent {...cp}/></div></div>
      </div>
      <nav className="bottom-nav">
        {NAV.map(n=><button key={n.key} className={`bnb ${tab===n.key?'active':''}`} onClick={()=>setTab(n.key)}><span className="ic">{n.ic}</span>{n.lb}</button>)}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
